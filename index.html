<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maloletki • Услуги Grand Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');
        
        :root {
            --dark: #0a0f1f;
            --deep-blue: #0f182e;
            --neon-pink: #ff00cc;
            --neon-cyan: #00f7ff;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--dark);
            color: white;
            overflow-x: hidden;
        }
        
        .title-font { font-family: 'Space Grotesk', sans-serif; }

        .hero-bg {
            background: linear-gradient(rgba(10,15,35,0.88), rgba(15,10,50,0.95)), 
                        url('https://i.ibb.co/0jK0z0K/grand-mobile-promo.jpg') center/cover no-repeat fixed;
            min-height: 100vh;
            animation: slowDrift 110s linear infinite;
        }

        @keyframes slowDrift {
            0% { background-position: 25% 50%; }
            100% { background-position: 75% 50%; }
        }

        .floating-object {
            position: absolute;
            opacity: 0.3;
            pointer-events: none;
            animation: float3D linear infinite;
            z-index: 1;
        }

        @keyframes float3D {
            0% { transform: translateY(120vh) rotate(0deg) scale(0.7); }
            100% { transform: translateY(-200px) rotate(1080deg) scale(1.4); }
        }

        .service-card {
            perspective: 2000px;
        }
        .service-card-inner {
            transition: transform 1s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            background: rgba(15, 24, 50, 0.97);
            border: 1px solid rgba(0, 247, 255, 0.25);
        }
        .service-card:hover .service-card-inner {
            transform: rotateY(25deg) rotateX(18deg) translateZ(80px);
            box-shadow: 0 0 90px 30px rgba(255, 0, 204, 0.45);
        }

        .neon-text {
            text-shadow: 0 0 30px #ff00cc, 0 0 60px #00f7ff;
        }

        /* 3D ЗАГРУЗКА ПРИ ВХОДЕ */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--dark);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: opacity 1.2s ease;
        }
        
        .loader-3d {
            width: 120px;
            height: 120px;
            border: 6px solid rgba(0, 247, 255, 0.2);
            border-top: 6px solid #00f7ff;
            border-radius: 50%;
            animation: spin3D 1.2s linear infinite;
            box-shadow: 0 0 40px #00f7ff;
        }
        
        @keyframes spin3D {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- 3D ЗАГРУЗКА ПРИ ВХОДЕ -->
    <div id="loader">
        <div class="loader-3d"></div>
        <p class="mt-8 text-3xl title-font tracking-widest neon-text">ПРИВЕТСТВУЮ</p>
        <p class="text-cyan-300 text-sm mt-2">Загрузка Maloletki...</p>
    </div>

    <!-- NAVBAR -->
    <nav class="bg-black/90 backdrop-blur-2xl sticky top-0 z-50 border-b border-cyan-500/30">
        <div class="max-w-7xl mx-auto px-5 py-6 flex justify-between items-center">
            <div class="title-font text-4xl md:text-5xl font-bold tracking-[-2px] bg-gradient-to-r from-cyan-400 to-pink-500 bg-clip-text text-transparent">
                MALOLETKI
            </div>
            <a href="https://t.me/mestny_strax" target="_blank" 
               class="flex items-center gap-3 bg-gradient-to-r from-pink-500 to-cyan-400 text-black font-bold px-7 py-4 rounded-3xl">
                <i class="fab fa-telegram-plane"></i>
                <span class="hidden sm:inline">@mestny_strax</span>
            </a>
        </div>
    </nav>

    <!-- HERO -->
    <section class="hero-bg relative flex items-center min-h-screen">
        <!-- Плавающие 3D объекты -->
        <div class="floating-object text-7xl" style="left:8%; animation-duration:42s;">🏎️</div>
        <div class="floating-object text-6xl" style="left:22%; animation-duration:55s; animation-delay:6s;">🌴</div>
        <div class="floating-object text-5xl" style="left:35%; animation-duration:48s; animation-delay:14s;">⭐</div>
        <div class="floating-object text-7xl" style="left:50%; animation-duration:60s;">🚗</div>
        <div class="floating-object text-6xl" style="left:70%; animation-duration:45s; animation-delay:10s;">🌴</div>
        <div class="floating-object text-5xl" style="left:82%; animation-duration:52s; animation-delay:22s;">💎</div>

        <div class="max-w-7xl mx-auto px-6 text-center relative z-10 py-24 md:py-32">
            <div class="inline-flex bg-black/60 backdrop-blur-2xl px-10 py-4 rounded-3xl mb-10 border border-cyan-400/40">
                <span class="text-2xl font-bold tracking-widest neon-text">УСЛУГИ</span>
            </div>
            
            <h1 class="text-5xl sm:text-6xl md:text-7xl lg:text-8xl title-font font-bold neon-text leading-none tracking-[-4px]">
                ОТ MALOLETKI
            </h1>
            
            <p class="mt-8 text-xl md:text-2xl text-cyan-100 max-w-2xl mx-auto">
                DFF • SB • HUD • Приватка • Монтаж видео
            </p>
            
            <a href="https://t.me/mestny_strax" target="_blank"
               class="mt-14 inline-block bg-gradient-to-r from-pink-500 to-cyan-400 text-black font-bold px-14 py-7 rounded-3xl text-2xl md:text-3xl hover:scale-105">
                Написать в Telegram
            </a>
        </div>
    </section>

    <!-- УСЛУГИ -->
    <section class="max-w-7xl mx-auto px-6 py-20 bg-[#0a1328]">
        <h2 class="text-4xl md:text-6xl title-font font-bold text-center neon-text mb-6">Наши услуги</h2>
        <p class="text-center text-cyan-200 text-lg md:text-xl mb-16">Цены в звёздах • Оплата Grand Donat</p>
        
        <div id="services-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-8">
            <!-- JS заполнит -->
        </div>
    </section>

    <!-- Нижний блок -->
    <div class="py-20 bg-black/80 text-center">
        <h3 class="text-3xl md:text-4xl font-bold mb-8">Где купить услуги?</h3>
        <a href="https://t.me/mestny_strax" target="_blank" 
           class="inline-flex items-center gap-4 text-3xl md:text-4xl font-bold bg-gradient-to-r from-pink-500 to-cyan-400 text-black px-14 py-8 rounded-3xl">
            <i class="fab fa-telegram-plane"></i>
            @mestny_strax
        </a>
        <p class="mt-10 text-red-400 text-xl">⚠️ Спам = ЧС</p>
        <p class="text-xl mt-3">🔴 Оплата только Grand Donat</p>
    </div>

    <script>
        const services = [
            {name: "Сделаю DFF / SB", price: 15, desc: "Готовый DFF или SB под ключ"},
            {name: "Сделаю HUD", price: 15, desc: "Красивый интерфейс"},
            {name: "Любая SB под вкус", price: 15, desc: "Сделаю сборку именно для тебя"},
            {name: "Научу делать свой DFF/SB", price: 25, desc: "Полный урок + файлы"},
            {name: "Научу делать HUD", price: 15, desc: "Урок по созданию интерфейса"},
            {name: "Научу SB без скинпака", price: 15, desc: "Чистая сборка"},
            {name: "Вход в приватку", price: 25, desc: "Доступ в закрытый сервер"},
            {name: "Смонтирую видео", price: 15, desc: "Профессиональный монтаж"}
        ];

        function renderServices() {
            const grid = document.getElementById('services-grid');
            grid.innerHTML = services.map(s => `
                <div class="service-card group">
                    <div class="service-card-inner rounded-3xl p-8 h-full flex flex-col">
                        <div class="flex justify-between mb-8">
                            <span class="text-6xl">⭐</span>
                            <div class="text-right">
                                <span class="text-5xl font-bold text-cyan-400">${s.price}</span>
                                <span class="block text-white/70">звёзд</span>
                            </div>
                        </div>
                        <h3 class="text-2xl font-semibold mb-3">${s.name}</h3>
                        <p class="text-gray-300 flex-1">${s.desc}</p>
                        
                        <a href="https://t.me/mestny_strax?text=Приветствую,%20я%20хочу%20купить%20у%20вас%20услугу%20\( {encodeURIComponent(s.name)}%20за%20 \){s.price}%20звёзд" 
                           target="_blank"
                           class="mt-10 block text-center py-6 bg-gradient-to-r from-pink-500 to-cyan-400 text-black font-bold rounded-3xl text-xl hover:brightness-110">
                            ЗАКАЗАТЬ В ТГ
                        </a>
                    </div>
                </div>
            `).join('');
        }

        // Убираем загрузку после 2.2 секунды
        window.onload = () => {
            renderServices();
            
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 1200);
            }, 2200);
        };
    </script>
</body>
</html>
